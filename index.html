<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>For You</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0509;
    --rose: #8b2d42;
    --rose-light: #c4617a;
    --rose-pale: #f0c4cc;
    --gold: #b8922a;
    --border: rgba(140,50,70,0.35);
  }

  html {
    height: 100%;
    /* prevent iOS bounce */
    overscroll-behavior: none;
  }

  body {
    min-height: 100%;
    min-height: 100dvh;
    background: var(--bg);
    color: #f0e8e0;
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Corners — smaller on mobile ── */
  .corner {
    position: fixed;
    width: clamp(60px, 15vw, 120px);
    height: clamp(60px, 15vw, 120px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 1;
  }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-br { bottom: 0; right: 0; transform: scale(-1); }

  /* ── Music unlock overlay ── */
  #unlock {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    text-align: center;
  }

  .unlock-symbol {
    font-size: 48px;
    animation: heartbeat 1.8s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%     { transform: scale(1.15); }
    28%     { transform: scale(1); }
    42%     { transform: scale(1.1); }
  }

  .unlock-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(22px, 6vw, 30px);
    color: #fdf0f2;
    line-height: 1.5;
  }

  .unlock-sub {
    font-size: clamp(13px, 3.5vw, 15px);
    color: #8a6a70;
    letter-spacing: 1px;
  }

  .btn-unlock {
    padding: 14px 40px;
    background: transparent;
    border: 1px solid var(--rose);
    color: #fdf0f2;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 4vw, 17px);
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }
  .btn-unlock::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--rose);
    transform: translateX(-100%);
    transition: transform 0.35s ease;
    z-index: 0;
  }
  .btn-unlock:active::before,
  .btn-unlock:hover::before { transform: translateX(0); }
  .btn-unlock:active, .btn-unlock:hover { color: #fff; }
  .btn-unlock span { position: relative; z-index: 1; }

  /* ── Stage ── */
  #stage {
    position: relative;
    z-index: 2;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 5vw, 2rem) clamp(1rem, 5vw, 1.5rem);
  }

  /* ── Card ── */
  .card {
    width: min(480px, 100%);
    text-align: center;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .card.visible { opacity: 1; transform: translateY(0); }

  /* ── Photo ── */
  .photo-ring {
    position: relative;
    width: clamp(140px, 42vw, 190px);
    height: clamp(140px, 42vw, 190px);
    margin: 0 auto 1.4rem;
  }

  .photo-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--rose);
    box-shadow: 0 0 18px rgba(139,45,66,0.4), inset 0 0 18px rgba(139,45,66,0.15);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 18px rgba(139,45,66,0.4), inset 0 0 18px rgba(139,45,66,0.15); }
    50%     { box-shadow: 0 0 32px rgba(196,97,122,0.6), inset 0 0 28px rgba(139,45,66,0.25); }
  }

  .photo-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border: 2px solid rgba(139,45,66,0.5);
  }

  /* ── Ornament ── */
  .ornament {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 6px;
    margin-bottom: 1rem;
    opacity: 0.7;
  }

  /* ── Message ── */
  .msg {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: clamp(20px, 5.5vw, 28px);
    line-height: 1.8;
    color: #fdf0f2;
    margin-bottom: 0.6rem;
    text-shadow: 0 0 40px rgba(196,97,122,0.35);
    padding: 0 0.25rem;
  }

  /* ── Dots ── */
  .dots {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1.4rem;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2e1018;
    border: 1px solid var(--rose);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .dot.on {
    background: var(--rose-light);
    box-shadow: 0 0 8px var(--rose-light);
  }

  /* ── Button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 1.4rem;
    padding: clamp(10px, 3vw, 13px) clamp(24px, 7vw, 36px);
    background: transparent;
    border: 1px solid var(--rose);
    color: var(--rose-pale);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 3.8vw, 16px);
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0;
    transition: color 0.3s;
    position: relative;
    overflow: hidden;
    min-height: 48px;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--rose);
    transform: translateX(-100%);
    transition: transform 0.35s ease;
    z-index: 0;
  }
  .btn:active::before,
  .btn:hover::before { transform: translateX(0); }
  .btn:active, .btn:hover { color: #fff; box-shadow: 0 0 20px rgba(139,45,66,0.5); }
  .btn span { position: relative; z-index: 1; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0.8rem 0 1rem;
    opacity: 0.4;
  }
  .divider hr { flex: 1; border: none; border-top: 1px solid var(--rose); }
  .divider span { color: var(--rose-light); font-size: 12px; }

  /* ── Video screen ── */
  #video-screen {
    display: none;
    width: min(480px, 100%);
    text-align: center;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  #video-screen.visible { opacity: 1; transform: translateY(0); }

  .video-frame {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    background: #0a0306;
    box-shadow: 0 0 40px rgba(139,45,66,0.25);
    margin-bottom: 1.4rem;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }
  .video-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(196,97,122,0.2);
    pointer-events: none;
  }

  .closing {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: clamp(18px, 5vw, 26px);
    color: #fdf0f2;
    text-shadow: 0 0 20px rgba(196,97,122,0.3);
    letter-spacing: 1px;
  }

  /* ── Music indicator ── */
  #music-indicator {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(13,5,9,0.75);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 12px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #music-indicator.show { opacity: 1; }
  #music-indicator .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }
  #music-indicator .bar {
    width: 3px;
    background: var(--rose-light);
    border-radius: 2px;
    animation: bar-dance 0.8s ease-in-out infinite alternate;
  }
  #music-indicator .bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
  #music-indicator .bar:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  #music-indicator .bar:nth-child(3) { height: 14px; animation-delay: 0.3s; }
  #music-indicator .bar:nth-child(4) { height: 8px;  animation-delay: 0.1s; }
  @keyframes bar-dance {
    from { transform: scaleY(0.3); }
    to   { transform: scaleY(1); }
  }
  #music-indicator.paused .bar { animation-play-state: paused; opacity: 0.4; }
  #music-indicator .lbl {
    font-size: 11px;
    color: #8a6a70;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- Music unlock overlay (required for autoplay on mobile) -->
<div id="unlock">
  <div class="unlock-symbol">🌹</div>
  <p class="unlock-title">My dirty Raccoon<br>for you</p>
  <button class="btn-unlock" onclick="startExperience()">
    <span>Open</span>
  </button>
</div>

<!-- Audio (pon tu canción aquí: song.mp3) -->
<audio id="bg-music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- Corner ornaments -->
<svg class="corner corner-tl" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 4 L4 60 Q4 4 60 4 Z" stroke="#8b2d42" stroke-width="0.8" fill="none"/>
  <path d="M4 4 L50 4" stroke="#b8922a" stroke-width="0.6"/>
  <path d="M4 4 L4 50" stroke="#b8922a" stroke-width="0.6"/>
  <circle cx="4" cy="4" r="3" fill="#8b2d42" opacity="0.8"/>
  <path d="M12 4 Q4 4 4 12" stroke="#8b2d42" stroke-width="0.5" fill="none"/>
  <path d="M22 4 Q4 4 4 22" stroke="#8b2d42" stroke-width="0.4" fill="none" stroke-dasharray="2 3"/>
  <circle cx="50" cy="4" r="1.5" fill="#b8922a" opacity="0.6"/>
  <circle cx="4" cy="50" r="1.5" fill="#b8922a" opacity="0.6"/>
</svg>
<svg class="corner corner-tr" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 4 L4 60 Q4 4 60 4 Z" stroke="#8b2d42" stroke-width="0.8" fill="none"/>
  <path d="M4 4 L50 4" stroke="#b8922a" stroke-width="0.6"/>
  <path d="M4 4 L4 50" stroke="#b8922a" stroke-width="0.6"/>
  <circle cx="4" cy="4" r="3" fill="#8b2d42" opacity="0.8"/>
  <path d="M12 4 Q4 4 4 12" stroke="#8b2d42" stroke-width="0.5" fill="none"/>
  <path d="M22 4 Q4 4 4 22" stroke="#8b2d42" stroke-width="0.4" fill="none" stroke-dasharray="2 3"/>
  <circle cx="50" cy="4" r="1.5" fill="#b8922a" opacity="0.6"/>
  <circle cx="4" cy="50" r="1.5" fill="#b8922a" opacity="0.6"/>
</svg>
<svg class="corner corner-bl" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 4 L4 60 Q4 4 60 4 Z" stroke="#8b2d42" stroke-width="0.8" fill="none"/>
  <path d="M4 4 L50 4" stroke="#b8922a" stroke-width="0.6"/>
  <path d="M4 4 L4 50" stroke="#b8922a" stroke-width="0.6"/>
  <circle cx="4" cy="4" r="3" fill="#8b2d42" opacity="0.8"/>
  <path d="M12 4 Q4 4 4 12" stroke="#8b2d42" stroke-width="0.5" fill="none"/>
  <path d="M22 4 Q4 4 4 22" stroke="#8b2d42" stroke-width="0.4" fill="none" stroke-dasharray="2 3"/>
  <circle cx="50" cy="4" r="1.5" fill="#b8922a" opacity="0.6"/>
  <circle cx="4" cy="50" r="1.5" fill="#b8922a" opacity="0.6"/>
</svg>
<svg class="corner corner-br" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M4 4 L4 60 Q4 4 60 4 Z" stroke="#8b2d42" stroke-width="0.8" fill="none"/>
  <path d="M4 4 L50 4" stroke="#b8922a" stroke-width="0.6"/>
  <path d="M4 4 L4 50" stroke="#b8922a" stroke-width="0.6"/>
  <circle cx="4" cy="4" r="3" fill="#8b2d42" opacity="0.8"/>
  <path d="M12 4 Q4 4 4 12" stroke="#8b2d42" stroke-width="0.5" fill="none"/>
  <path d="M22 4 Q4 4 4 22" stroke="#8b2d42" stroke-width="0.4" fill="none" stroke-dasharray="2 3"/>
  <circle cx="50" cy="4" r="1.5" fill="#b8922a" opacity="0.6"/>
  <circle cx="4" cy="50" r="1.5" fill="#b8922a" opacity="0.6"/>
</svg>

<canvas id="canvas"></canvas>

<!-- Music indicator (tap to pause/resume) -->
<div id="music-indicator" onclick="toggleMusic()" role="button" aria-label="Toggle music">
  <div class="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <span class="lbl" id="music-lbl">Music</span>
</div>

<div id="stage">

  <!-- Message card -->
  <div class="card" id="card">
    <div class="dots" id="dots"></div>

    <div class="photo-ring">
      <img id="photo" src="foto1.jpeg" alt="" onerror="this.style.display='none'">
    </div>

    <div class="ornament">— ✦ —</div>
    <p class="msg" id="msg-text"></p>
    <div class="divider"><hr><span>✦</span><hr></div>

    <button class="btn" id="btn-next" onclick="nextStep()">
      <span id="btn-label">Continue</span>
    </button>
  </div>

  <!-- Video screen -->
  <div id="video-screen">
    <div class="video-frame">
      <video id="my-video" controls playsinline poster="portada.jpeg">
        <source src="mi_video.mp4" type="video/mp4">
      </video>
    </div>
    <p class="closing">With all my Amor, for you 💕</p>
  </div>

</div>

<script>
const steps = [
  { img: "foto1.jpeg", text: "EGO" },
  { img: "foto2.jpeg", text: "EGO" },
  { img: "foto3.jpeg", text: "EGO" },
  { img: "foto4.jpeg", text: "EGO" },
  { img: "foto5.jpeg", text: "EGO" }
];

let current = 0;
let musicPaused = false;

const card      = document.getElementById('card');
const videoSc   = document.getElementById('video-screen');
const msgEl     = document.getElementById('msg-text');
const photoEl   = document.getElementById('photo');
const dotsEl    = document.getElementById('dots');
const btnLabel  = document.getElementById('btn-label');
const bgMusic   = document.getElementById('bg-music');
const indicator = document.getElementById('music-indicator');
const musicLbl  = document.getElementById('music-lbl');
const vid       = document.getElementById('my-video');

// ── Unlock & start music (needed for mobile autoplay policy) ──
function startExperience() {
  document.getElementById('unlock').style.display = 'none';
  bgMusic.volume = 0.6;
  bgMusic.play().catch(() => {});
  setTimeout(() => indicator.classList.add('show'), 800);
  buildDots();
  msgEl.textContent = steps[0].text;
  card.classList.add('visible');
}

// ── Toggle music ──
function toggleMusic() {
  if (bgMusic.paused) {
    bgMusic.play();
    musicPaused = false;
    indicator.classList.remove('paused');
    musicLbl.textContent = 'Music';
  } else {
    bgMusic.pause();
    musicPaused = true;
    indicator.classList.add('paused');
    musicLbl.textContent = 'Paused';
  }
}

// ── Video: pause music when playing, resume when paused/ended ──
vid.addEventListener('play', () => {
  bgMusic.pause();
  indicator.classList.add('paused');
  musicLbl.textContent = 'Paused';
});
vid.addEventListener('pause', () => {
  if (!musicPaused) {
    bgMusic.play();
    indicator.classList.remove('paused');
    musicLbl.textContent = 'Music';
  }
});
vid.addEventListener('ended', () => {
  if (!musicPaused) {
    bgMusic.play();
    indicator.classList.remove('paused');
    musicLbl.textContent = 'Music';
  }
});

// ── Progress dots ──
function buildDots() {
  dotsEl.innerHTML = '';
  for (let i = 0; i <= steps.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' on' : '');
    dotsEl.appendChild(d);
  }
}

// ── Show step ──
function showStep(i) {
  card.classList.remove('visible');
  setTimeout(() => {
    const s = steps[i];
    photoEl.src = s.img;
    photoEl.style.display = 'block';
    msgEl.textContent = s.text;
    btnLabel.textContent = i < steps.length - 1 ? 'Continue' : 'Watch the video';
    buildDots();
    card.classList.add('visible');
  }, 400);
}

function nextStep() {
  current++;
  if (current < steps.length) {
    showStep(current);
  } else {
    card.classList.remove('visible');
    setTimeout(() => {
      card.style.display = 'none';
      videoSc.style.display = 'block';
      requestAnimationFrame(() => videoSc.classList.add('visible'));
    }, 500);
  }
}

// ── Particles ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
const particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const colors = ['rgba(139,45,66,','rgba(196,97,122,','rgba(184,146,42,'];

function Particle() {
  this.reset = function() {
    this.x = Math.random() * W;
    this.y = H + 10;
    this.vy = -(0.2 + Math.random() * 0.5);
    this.vx = (Math.random() - 0.5) * 0.3;
    this.size = 1 + Math.random() * 2;
    this.alpha = 0.1 + Math.random() * 0.4;
    this.color = colors[Math.floor(Math.random() * colors.length)];
  };
  this.reset();
  this.y = Math.random() * H;
}

for (let i = 0; i < 55; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) p.reset();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color + p.alpha + ')';
    ctx.fill();
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
